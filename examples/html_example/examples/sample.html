            <style>
                body {
                    font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;

                }
                h1, h2, h3, h4, h5, h6 {
                    color: #2c3e50;

                }

                    background-color: #f4f4f4;

                }
                pre {
                    background-color: #f4f4f4;
                    padding: 15px;
                    border-radius: 5px;

                }
                pre code {
                    background-color: transparent;
                    padding: 0;
                }
                blockquote {
                    border-left: 4px solid #ddd;

                    border-collapse: collapse;

                }
                a {
                    color: #3498db;

                }

                    text-decoration: underline;
                }

                }

body {
    background-color: #f5f5f5;
}

h1 {
    color: #e74c3c;

            <h1 id="示例文件说明">示例文件说明</h1>

<p>本目录包含 mdtool 库的使用示例文件。</p>

<h2 id="文件列表">文件列表</h2>

<ul>
<li><code>sample.md</code> - 示例 Markdown 源文件</li>
<li><code>custom.css</code> - 自定义 CSS 样式文件</li>
<li><code>html_example.py</code> - HTML 转换示例代码</li>
<li><code>examples/sample.html</code> - 转换后的 HTML 文件（自动生成）</li>
</ul>

<h2 id="使用说明">使用说明</h2>

<p>运行示例代码：</p>

<pre><code>python html_example.py
</code></pre>

<p>这将把 <code>sample.md</code> 转换为 <code>sample.html</code>。</p>
